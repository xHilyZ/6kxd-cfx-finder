<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6KXD CFX Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page-wrap">

        <header class="header glass">
            <div class="brand">
                <div class="brand-mark">6KXD</div>
                <div class="brand-text">
                    <h1>CFX Finder</h1>
                    <p>Fast • Clean • Neon</p>
                </div>
            </div>
            <button id="themeToggle" class="theme-toggle">Dark</button>
        </header>

        <main class="main">

            <section class="card glass input-card">
                <div class="input-header">
                    <div>
                        <label for="cfxInput">Enter CFX Code</label>
                        <p class="hint">Paste a code or full cfx.re link</p>
                    </div>
                    <button id="analyzeBtn" class="primary-btn">Lookup</button>
                </div>
                <div class="input-row">
                    <input id="cfxInput" type="text" placeholder="e.g. abc123">
                </div>
                <p id="statusText" class="status">Waiting for input…</p>
            </section>

            <section class="card glass history-card">
                <div class="section-header">
                    <h2>Recent Lookups</h2>
                </div>
                <ul id="historyList" class="history-list">
                    <!-- Filled by JS -->
                </ul>
            </section>

            <section class="results-panel glass slide-panel" id="resultsPanel">
                <div class="slide-handle"></div>

                <div class="results-header">
                    <div>
                        <h2 id="serverName" class="server-title shimmer">Server Name</h2>
                        <p id="serverPlayers" class="server-sub shimmer">0 players</p>
                    </div>
                    <div class="results-actions">
                        <button id="joinBtn" class="outline-btn" disabled>Join Server</button>
                    </div>
                </div>

                <div class="banner-row">
                    <img id="serverBanner" class="server-banner shimmer" style="display:none;">
                    <img id="serverIcon" class="server-icon shimmer" style="display:none;">
                </div>

                <div class="results-grid">

                    <div class="panel glass-soft">
                        <h3>Endpoints</h3>
                        <ul id="serverEndpoints" class="list small-list shimmer">
                            <!-- Filled by JS -->
                        </ul>
                    </div>

                    <div class="panel glass-soft">
                        <h3>Resources</h3>
                        <ul id="serverResources" class="list small-list shimmer">
                            <!-- Filled by JS -->
                        </ul>
                    </div>

                    <div class="panel glass-soft players-panel">
                        <h3>Players</h3>
                        <div id="playersList" class="players-list shimmer">
                            <!-- Filled by JS -->
                        </div>
                    </div>

                </div>
            </section>

        </main>

        <footer class="footer glass">
            <p>Built for 6KXD • CFX Lookup • Minimal Neon Glass</p>
        </footer>

    </div>

    <script src="app.js"></script>
</body>
</html>
