<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>6kxd CFX Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header glass">
    <h2 class="header-title centered-title">6kxd CFX Finder</h2>
  </header>

  <div class="container">

    <!-- SEARCH AREA -->
    <h1 class="title">CFX.re Server Finder</h1>
    <p class="subtitle">Get detailed information about any FiveM server instantly</p>

    <div class="input-card glass">
      <input id="cfxInput" type="text" placeholder="Paste CFX link, IP:PORT, or any message containing a code">
      <button id="analyzeBtn" class="btn-primary">Analyze</button>
    </div>

    <!-- RECENT LOOKUPS -->
    <div id="recentLookups" class="recent-lookups glass" style="display:none;">
      <div class="recent-header">
        <span>Recent Lookups</span>
        <button id="clearRecent" class="btn-link">Clear</button>
      </div>
      <div id="recentList" class="recent-list"></div>
    </div>

    <!-- AUTO REFRESH -->
    <div class="auto-refresh glass">
      <label for="autoRefreshSelect">Auto-refresh:</label>
      <select id="autoRefreshSelect">
        <option value="0">Off</option>
        <option value="10000">Every 10s</option>
        <option value="30000">Every 30s</option>
        <option value="60000">Every 60s</option>
      </select>
      <span id="lastRefresh" class="last-refresh"></span>
    </div>

    <!-- GREETING -->
    <div id="greeting" class="greeting glass">
      Ready to search. Enter a CFX code above.
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="footer glass">
    <span>Built by 6kxd | Powered by CFX.re</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
