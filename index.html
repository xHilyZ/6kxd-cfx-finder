<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6KXD CFX Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header>
            <h1>6KXD CFX Finder</h1>
            <p class="subtitle">Fast. Clean. Reliable.</p>
        </header>

        <div class="card glass">
            <label for="cfxInput">Enter CFX Code</label>
            <div class="input-row">
                <input id="cfxInput" type="text" placeholder="e.g. abc123">
                <button id="analyzeBtn">Lookup</button>
            </div>
            <p id="statusText" class="status">Waiting for input…</p>
        </div>

        <div class="results glass">
            <h2 id="serverName">Server Name</h2>
            <img id="serverIcon" class="server-icon" style="display:none;">
            <p id="serverPlayers">0 players</p>

            <h3>Endpoints</h3>
            <ul id="serverEndpoints"></ul>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
