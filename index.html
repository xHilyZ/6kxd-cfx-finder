<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>6kxd CFX Finder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <h1 class="centered-title">6kxd CFX Finder</h1>
    </div>

    <!-- SEARCH ALL SERVERS (NEW) -->
    <div class="global-search glass">
        <div class="input-card">
            <input id="globalSearchInput" type="text" placeholder="Search all servers...">
            <button id="globalSearchBtn" class="btn-primary">Search</button>
        </div>
    </div>

    <!-- MAIN TITLE + SUBTITLE -->
    <h1 class="title">CFX.re Server Finder</h1>
    <p class="subtitle">Get detailed information about any FiveM server instantly</p>

    <!-- CFX CODE INPUT -->
    <div class="glass input-card" style="max-width:900px; margin:0 auto;">
        <input id="cfxInput" type="text" placeholder="Paste CFX link, IP:PORT, or any message containing a code">
        <button id="analyzeBtn" class="btn-primary">Analyze</button>
    </div>

    <!-- STATUS BAR -->
    <div class="glass status-bar" style="max-width:900px; margin:20px auto;">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText" class="status-text">Waiting...</span>
    </div>

    <!-- GREETING -->
    <div id="greeting" class="glass greeting" style="max-width:900px; margin:0 auto;">
        Ready to search. Enter a CFX code above.
    </div>

    <!-- SERVER INFO CARD -->
    <div id="serverInfo" class="glass server-card" style="max-width:900px; margin:30px auto; display:none;">

        <!-- LEFT SIDE -->
        <div class="server-left">
            <div id="serverIcon" class="server-icon"></div>

            <div class="server-status-row">
                <h2 id="serverName" class="server-name"></h2>
            </div>

            <p id="serverIP"></p>

            <div id="serverCountry" class="server-country"></div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="server-right">

            <div id="serverBannerWrap" class="banner-wrap" style="display:none;">
                <img id="serverBanner" class="server-banner">
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <h4>Players</h4>
                    <p id="statPlayers">0</p>
                </div>
                <div class="stat-box">
                    <h4>Resources</h4>
                    <p id="statResources">0</p>
                </div>
                <div class="stat-box">
                    <h4>Build</h4>
                    <p id="statBuild">N/A</p>
                </div>
                <div class="stat-box">
                    <h4>Locale</h4>
                    <p id="statLocale">N/A</p>
                </div>
            </div>

            <p id="serverDesc"></p>
            <p id="serverLoc"></p>

            <button id="openFullPanel" class="btn-secondary full-btn">View Players & Resources</button>
        </div>
    </div>

    <!-- FULL PANEL OVERLAY -->
    <div id="overlay" class="overlay"></div>

    <!-- FULL PANEL -->
    <div id="fullPanel" class="glass full-panel">

        <h2 class="panel-title">Server Details</h2>

        <div class="panel-grid">

            <!-- PLAYERS -->
            <div>
                <h3 class="panel-heading">Players</h3>
                <input id="playerSearch" class="panel-search" type="text" placeholder="Search players...">
                <div id="fullPlayers"></div>
            </div>

            <!-- RESOURCES -->
            <div>
                <h3 class="panel-heading">Resources</h3>
                <div class="resource-controls">
                    <input id="resourceSearch" class="panel-search" type="text" placeholder="Search resources...">
                    <button id="resourceSort" class="btn-secondary small">Sort</button>
                </div>
                <div id="fullResources"></div>
            </div>

        </div>

        <button id="closePanel" class="close-btn">Close</button>
    </div>

    <div class="footer">Built by 6kxd | Powered by CFX.re</div>

    <script src="app.js"></script>
</body>
</html>
