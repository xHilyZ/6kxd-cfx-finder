<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>6kxd CFX Finder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>

<body>

    <div class="container">

        <h1 class="title">6kxd CFX Finder</h1>

        <!-- SERVER NAME SEARCH -->
        <div class="search-row">
            <input id="globalSearchInput" type="text" placeholder="Search all servers...">
            <button id="globalSearchBtn" class="search-btn">Search</button>
        </div>

        <h2>CFX.re Server Finder</h2>
        <p>Get detailed information about any FiveM server instantly</p>

        <!-- CFX CODE SEARCH -->
        <input id="cfxInput" type="text" placeholder="Paste CFX link, IP:PORT, or any message containing a code">
        <button id="analyzeBtn" class="analyze-btn">Analyze</button>

        <!-- STATUS -->
        <div class="status-bar">
            <span id="statusDot" class="status-dot"></span>
            <span id="statusText">Waiting...</span>
        </div>

        <!-- SERVER INFO -->
        <div id="serverInfo" style="display:none;">
            <h3 id="serverName"></h3>
            <p id="serverIP"></p>

            <div id="serverBannerWrap" style="display:none;">
                <img id="serverBanner" />
            </div>

            <p><strong>Build:</strong> <span id="statBuild"></span></p>
            <p><strong>Locale:</strong> <span id="statLocale"></span></p>
            <p><strong>Description:</strong> <span id="serverDesc"></span></p>
            <p><strong>Location:</strong> <span id="serverLoc"></span></p>
            <p><strong>Country:</strong> <span id="serverCountry"></span></p>

            <button id="openFullPanel">View Players & Resources</button>
        </div>

        <!-- FULL PANEL -->
        <div id="overlay"></div>
        <div id="fullPanel">
            <button id="closePanel">Close</button>

            <h3>Players</h3>
            <input id="playerSearch" type="text" placeholder="Search players...">
            <div id="fullPlayers"></div>

            <h3>Resources</h3>
            <input id="resourceSearch" type="text" placeholder="Search resources...">
            <button id="resourceSort">Sort</button>
            <div id="fullResources"></div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
