<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Server Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <!-- Banner -->
  <div class="banner-wrap">
    <img id="serverBanner" class="banner-img" src="" alt="Server Banner">
  </div>

  <!-- Server Name + Status -->
  <div class="server-header">
    <h1 id="serverName">Server Name</h1>
    <div class="status-row">
      <span class="status-dot"></span>
      <span id="serverStatus">Online</span>
    </div>
    <div id="ipEl" class="server-ip">IP: Unknown</div>
  </div>

  <!-- Stats Grid -->
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-label">Players</div>
      <div id="statPlayers" class="stat-value">0 / 0</div>
    </div>

    <div class="stat-box">
      <div class="stat-label">Resources</div>
      <div id="statResources" class="stat-value">0</div>
    </div>

    <div class="stat-box">
      <div class="stat-label">Build</div>
      <div id="statBuild" class="stat-value">Unknown</div>
    </div>

    <div class="stat-box">
      <div class="stat-label">Locale</div>
      <div id="statLocale" class="stat-value">Unknown</div>
    </div>
  </div>

  <!-- Buttons Row -->
  <div class="button-row">
    <button id="copyIP">Copy IP</button>
    <button id="copyCFX">Copy CFX</button>
    <button id="openFiveM">Open in FiveM</button>
    <button id="openDiscord">Discord</button>
    <button id="openWebsite">Website</button>
  </div>

  <!-- Latency Bars -->
  <div class="latency-block">
    <div class="latency-bar green"></div>
    <div class="latency-bar yellow"></div>
    <div class="latency-bar orange"></div>
    <div class="latency-bar red"></div>

    <div class="latency-labels">
      <span>0–50ms</span>
      <span>50–100ms</span>
      <span>100–150ms</span>
      <span>150ms+</span>
    </div>
  </div>

  <!-- JSON Buttons -->
  <div class="json-row">
    <button id="playersJSON">Players JSON</button>
    <button id="serverJSON">Server Info JSON</button>
  </div>

  <!-- Footer -->
  <div class="footer">
    Built by 6ixxd | Powered by CFX.re
  </div>

</div>

</body>
</html>

<script src="app.js"></script>
